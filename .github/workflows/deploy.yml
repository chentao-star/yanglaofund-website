name: Deploy to Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.7.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
    
    - name: Deploy to server
      run: |
        echo "🚀 部署到服务器..."
        mkdir -p ~/.ssh
        ssh-keyscan -H ${{ secrets.SERVER_IP }} > ~/.ssh/known_hosts 2>/dev/null || true
        scp -o StrictHostKeyChecking=no index.html ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:/var/www/pension-website/
        echo "✅ 部署完成"
    
    - name: Verify deployment
      run: |
        echo "🔍 验证网站..."
        sleep 2
        curl -s -o /dev/null -w "HTTP Status: %{http_code}\n" https://yanglaofund.com
