        * {

            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;

            min-height: 100vh;
        }

/* 免责声明 */
        .disclaimer-banner {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%);
            color: white;
            padding: 12px 0;
            position: relative;
            z-index: 101;
        }
        
        .disclaimer-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 13px;
            line-height: 1.5;
        }
        
        .disclaimer-icon {
            font-size: 18px;
            flex-shrink: 0;
        }
        
        .disclaimer-content p {
            margin: 0;
            opacity: 0.95;
        }
        
        @media (max-width: 768px) {
            .disclaimer-content {
                font-size: 12px;
                padding: 0 15px;
            }
        }

        /* 头部样式 */
        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
        }

        .logo h1 {
            font-size: 24px;
            color: #333;
            font-weight: 600;
        }

        .search-box {
            position: relative;
            width: 350px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 45px 12px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 15px;
            transition: all 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
        }

        .search-box button {
            position: absolute;
            right: 5px;
            top: 50%;
            transform: translateY(-50%);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
        }

        /* 主体布局 */
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px;
            display: flex;
            gap: 25px;
        }

        /* 侧边栏筛选 */
        .sidebar {
            width: 280px;
            flex-shrink: 0;
        }

        .filter-section {
            background: white;
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .filter-section h3 {
            font-size: 16px;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-section h3::before {
            content: '';
            width: 4px;
            height: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
        }

        .filter-group {
            margin-bottom: 20px;
        }

        .filter-group label {
            display: block;
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .filter-options {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 1px solid #e0e0e0;
            background: white;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-btn:hover, .filter-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }

        /* 排序选择 */
        .sort-select {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            background: white;
        }

        /* 内容区域 */
        .content {
            flex: 1;
        }

        .stats-bar {
            background: white;
            border-radius: 12px;
            padding: 20px 25px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-around;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            font-size: 13px;
            color: #666;
            margin-top: 5px;
        }

        /* 产品卡片网格 */
        .fund-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .fund-card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            transition: all 0.3s;
            cursor: pointer;
        }

        .fund-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
        }

        .fund-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .fund-title {
            flex: 1;
        }

        .fund-name {
            font-size: 17px;
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
            line-height: 1.4;
        }

        .fund-code {
            font-size: 13px;
            color: #999;
            font-family: monospace;
        }

        .fund-type-tag {
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: 500;
        }

        .tag-date {
            background: #e3f2fd;
            color: #1976d2;
        }

        .tag-risk {
            background: #fff3e0;
            color: #f57c00;
        }

        .tag-index {
            background: #e8f5e9;
            color: #388e3c;
        }

        .tag-fof {
            background: #f3e5f5;
            color: #7b1fa2;
        }

        .fund-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 15px;
            padding: 15px 0;
            border-top: 1px solid #f0f0f0;
            border-bottom: 1px solid #f0f0f0;
        }

        .info-item {
            display: flex;
            flex-direction: column;
        }

        .info-label {
            font-size: 12px;
            color: #999;
            margin-bottom: 4px;
        }

        .info-value {
            font-size: 14px;
            color: #333;
            font-weight: 500;
        }

        .fund-scale {
            font-size: 20px;
            font-weight: 700;
            color: #667eea;
        }

        .fund-return {
            font-size: 20px;
            font-weight: 700;
        }

        .return-positive {
            color: #f44336;
        }

        .return-negative {
            color: #4caf50;
        }

        .fund-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .risk-level {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .risk-label {
            font-size: 12px;
            color: #666;
        }

        .risk-bars {
            display: flex;
            gap: 3px;
        }

        .risk-bar {
            width: 8px;
            height: 16px;
            border-radius: 2px;
            background: #e0e0e0;
        }

        .risk-bar.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .suitable-for {
            font-size: 12px;
            color: #666;
            background: #f5f5f5;
            padding: 5px 12px;
            border-radius: 12px;
        }

        /* 响应式设计 */
        @media (max-width: 1024px) {
            .main-container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
            }

            .filter-section {
                display: flex;
                flex-wrap: wrap;
                gap: 20px;
            }

            .filter-group {
                flex: 1;
                min-width: 200px;
                margin-bottom: 0;
            }
        }

        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                text-align: center;
            }

            .search-box {
                width: 100%;
                max-width: 400px;
            }

            .fund-grid {
                grid-template-columns: 1fr;
            }

            .stats-bar {
                flex-wrap: wrap;
                gap: 20px;
            }

            .stat-item {
                flex: 1;
                min-width: 100px;
            }
        }

        /* 加载动画 */
        .loading {
            text-align: center;
            padding: 50px;
            color: #666;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .empty-text {
            font-size: 18px;
            color: #666;
            margin-bottom: 10px;
        }

        .empty-hint {
            font-size: 14px;
            color: #999;
        }

</head>

        // 当前筛选状态
        let currentFilters = {
            type: 'all',
            company: 'all',
            risk: 'all',
            investor: 'all',
            search: ''
        };

        let currentSort = 'default';

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            renderFunds();
            setupFilters();
        });

        // 渲染基金列表
        function renderFunds() {
            const grid = document.getElementById('fundGrid');
            let filteredFunds = filterFunds();
            
            // 排序
            filteredFunds = sortFundList(filteredFunds);
            
            // 更新统计
            document.getElementById('showingFunds').textContent = filteredFunds.length;
            
            if (filteredFunds.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <div class="empty-icon">🔍</div>
                        <div class="empty-text">未找到符合条件的产品</div>
                        <div class="empty-hint">请调整筛选条件或搜索关键词</div>
                    </div>
                `;
                return;
            }
            
            grid.innerHTML = filteredFunds.map(fund => createFundCard(fund)).join('');
        }

        // 创建基金卡片
        function createFundCard(fund) {
            const typeClass = {
                'date': 'tag-date',
                'risk': 'tag-risk',
                'index': 'tag-index',
                'fof': 'tag-fof'
            }[fund.type] || 'tag-date';
            
            const riskBars = parseInt(fund.risk.charAt(1));
            const returnClass = fund.return1y >= 0 ? 'return-positive' : 'return-negative';
            
            return `
                <div class="fund-card" onclick="showFundDetail(${fund.id})">
                    <div class="fund-header">
                        <div class="fund-title">
                            <div class="fund-name">${fund.name}</div>
                            <div class="fund-code">${fund.code}</div>
                        </div>
                        <span class="fund-type-tag ${typeClass}">${fund.typeName}</span>
                    </div>
                    
                    <div class="fund-info">
                        <div class="info-item">
                            <span class="info-label">基金公司</span>
                            <span class="info-value">${fund.company}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">基金规模</span>
                            <span class="info-value fund-scale">${fund.scale}亿</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">基金经理</span>
                            <span class="info-value">${fund.manager}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">近一年收益</span>
                            <span class="info-value fund-return ${returnClass}">${fund.return1y > 0 ? '+' : ''}${fund.return1y}%</span>
                        </div>
                    </div>
                    
                    <div class="fund-footer">
                        <div class="risk-level">
                            <span class="risk-label">风险等级</span>
                            <div class="risk-bars">
                                ${Array(5).fill(0).map((_, i) => `
                                    <div class="risk-bar ${i < riskBars ? 'active' : ''}"></div>
                                `).join('')}
                            </div>
                            <span style="font-size: 12px; color: #666; margin-left: 5px;">${fund.risk}</span>
                        </div>
                        <span class="suitable-for">适合: ${fund.suitable}</span>
                    </div>
                </div>
            `;
        }

        // 筛选基金
        function filterFunds() {
            return pensionFunds.filter(fund => {
                // 类型筛选
                if (currentFilters.type !== 'all' && fund.type !== currentFilters.type) {
                    return false;
                }
                
                // 公司筛选
                if (currentFilters.company !== 'all' && fund.company !== currentFilters.company) {
                    return false;
                }
                
                // 风险筛选
                if (currentFilters.risk !== 'all' && fund.risk !== currentFilters.risk) {
                    return false;
                }
                
                // 投资者类型筛选
                if (currentFilters.investor !== 'all' && fund.suitable !== currentFilters.investor) {
                    return false;
                }
                
                // 搜索筛选
                if (currentFilters.search) {
                    const searchLower = currentFilters.search.toLowerCase();
                    return fund.name.toLowerCase().includes(searchLower) || 
                           fund.code.toLowerCase().includes(searchLower);
                }
                
                return true;
            });
        }

        // 排序基金列表
        function sortFundList(funds) {
            const sorted = [...funds];
            
            switch(currentSort) {
                case 'scale-desc':
                    sorted.sort((a, b) => b.scale - a.scale);
                    break;
                case 'scale-asc':
                    sorted.sort((a, b) => a.scale - b.scale);
                    break;
                case 'return-desc':
                    sorted.sort((a, b) => b.return1y - a.return1y);
                    break;
                case 'return-asc':
                    sorted.sort((a, b) => a.return1y - b.return1y);
                    break;
                default:
                    // 默认按ID排序
                    break;
            }
            
            return sorted;
        }

        // 设置筛选器
        function setupFilters() {
            // 类型筛选
            document.getElementById('typeFilters').addEventListener('click', function(e) {
                if (e.target.classList.contains('filter-btn')) {
                    updateFilter('type', e.target.dataset.type, e.target);
                }
            });
            
            // 公司筛选
            document.getElementById('companyFilters').addEventListener('click', function(e) {
                if (e.target.classList.contains('filter-btn')) {
                    updateFilter('company', e.target.dataset.company, e.target);
                }
            });
            
            // 风险筛选
            document.getElementById('riskFilters').addEventListener('click', function(e) {
                if (e.target.classList.contains('filter-btn')) {
                    updateFilter('risk', e.target.dataset.risk, e.target);
                }
            });
            
            // 投资者筛选
            document.getElementById('investorFilters').addEventListener('click', function(e) {
                if (e.target.classList.contains('filter-btn')) {
                    updateFilter('investor', e.target.dataset.investor, e.target);
                }
            });
            
            // 搜索输入
            document.getElementById('searchInput').addEventListener('input', function(e) {
                currentFilters.search = e.target.value.trim();
                renderFunds();
            });
        }

        // 更新筛选条件
        function updateFilter(filterType, value, btnElement) {
            currentFilters[filterType] = value;
            
            // 更新按钮状态
            const parent = btnElement.parentElement;
            parent.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            btnElement.classList.add('active');
            
            renderFunds();
        }

        // 搜索基金
        function searchFunds() {
            const searchValue = document.getElementById('searchInput').value.trim();
            currentFilters.search = searchValue;
            renderFunds();
        }

        // 排序基金
        function sortFunds() {
            currentSort = document.getElementById('sortSelect').value;
            renderFunds();
        }

        // 显示基金详情（可扩展）
        function showFundDetail(fundId) {
            const fund = pensionFunds.find(f => f.id === fundId);
            if (fund) {
                alert(`基金详情:\n\n名称: ${fund.name}\n代码: ${fund.code}\n基金公司: ${fund.company}\n基金经理: ${fund.manager}\n基金规模: ${fund.scale}亿元\n风险等级: ${fund.risk}\n适合投资者: ${fund.suitable}\n近一年收益率: ${fund.return1y}%\n成立日期: ${fund.establishDate}`);
            }
        }
    </script>
